<!-- ============================================================
  components/Navbar/Navbar.html — Barra superior con navegación
  Placeholders: {{wallet}} (dirección abreviada), {{cycle}} (ciclo)
  El estado activo de las pestañas lo marca Navbar.js (.is-active)
============================================================= -->
<div class="navbar">
  <div class="navbar__inner">
    <a href="#/home" class="logo navbar__logo" aria-label="N0Loss — inicio">
      N<svg class="logo__ring" width="17" height="17" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2.6"></circle>
        <line x1="7" y1="17" x2="17" y2="7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"></line>
      </svg>LOSS
    </a>

    <nav class="navbar__nav" aria-label="Navegación principal">
      <a href="#/home" class="navbar__tab" data-route="home">Mi panel</a>
      <a href="#/vault" class="navbar__tab" data-route="vault">Vault</a>
      <a href="#/lottery" class="navbar__tab" data-route="lottery">Sorteo</a>
      <a href="#/portfolio" class="navbar__tab" data-route="portfolio">Portafolio</a>
      <a href="#/settings" class="navbar__tab" data-route="settings">Ajustes</a>
    </nav>

    <div class="navbar__spacer"></div>

    <span class="badge badge--gold navbar__cycle">Ciclo {{cycle}}</span>

    <span class="navbar__wallet" title="Wallet conectada">
      <span class="navbar__dot" aria-hidden="true"></span>
      <span class="mono">{{wallet}}</span>
    </span>

    <button class="btn btn--ghost navbar__logout" data-action="logout">Salir</button>
  </div>
</div>
